name: Trigger auto deployment for banco-mcp-server

# When this action will be executed
on:
  # Automatically trigger it when detected changes in repo
  push:
    branches: 
      [ master ]
    paths:
    - '**'
    - '.github/workflows/banco-mcp-server-AutoDeployTrigger-9d22a7e1-3a27-41a7-b017-0b858e0f561d.yml'

  # Allow manual trigger 
  workflow_dispatch:      

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions: 
      id-token: write #This is required for requesting the OIDC JWT Token
      contents: read #Required when GH token is used to authenticate with private repo

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v2

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.BANCOMCPSERVER_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.BANCOMCPSERVER_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.BANCOMCPSERVER_AZURE_SUBSCRIPTION_ID }}

      - name: Build and push container image to registry
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}
          _dockerfilePathKey_: _dockerfilePath_
          _targetLabelKey_: _targetLabel_
          registryUrl: docker.io
          registryUsername: ${{ secrets.BANCOMCPSERVER_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.BANCOMCPSERVER_REGISTRY_PASSWORD }}
          containerAppName: banco-mcp-server
          resourceGroup: rg-banco-mcp
          imageToBuild: mainorgmv/banco-mcp-server:${{ github.sha }}
          _buildArgumentsKey_: |
            _buildArgumentsValues_


